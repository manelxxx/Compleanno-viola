<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tanti auguri, Viola</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

html{
scroll-behavior:smooth;
}

body{
background:#f7f5f2;
color:#222;
font-family:Arial,Helvetica,sans-serif;
}

.page{
width:100%;
max-width:820px;
margin:0 auto;
padding:60px 22px 100px;
animation:appear 1s ease;
}

.intro-section{
margin-bottom:75px;
text-align:center;
}

h1{
margin-bottom:28px;
font-size:clamp(40px,9vw,64px);
font-weight:500;
letter-spacing:-1.5px;
}

.intro-text{
max-width:700px;
margin:0 auto;
color:#555;
font-size:clamp(17px,4vw,20px);
line-height:1.9;
}

.main-title{
margin-bottom:18px;
text-align:center;
font-size:clamp(32px,7vw,46px);
font-weight:500;
letter-spacing:-1px;
}

.main-description{
max-width:670px;
margin:0 auto 80px;
text-align:center;
color:#666;
font-size:18px;
line-height:1.8;
}

.step{
margin-bottom:95px;
}

.step-heading{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:28px;
text-align:center;
}

.step-number{
display:flex;
align-items:center;
justify-content:center;
width:54px;
height:54px;
margin-bottom:18px;
border-radius:50%;
background:#4f7658;
color:white;
font-size:22px;
font-weight:600;
box-shadow:0 9px 22px rgba(79,118,88,.22);
}

.step-label{
margin-bottom:9px;
color:#4f7658;
font-size:13px;
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
}

.step h2{
margin-bottom:14px;
font-size:clamp(27px,6vw,37px);
font-weight:500;
line-height:1.2;
}

.step-text{
max-width:660px;
margin:0 auto 28px;
color:#555;
font-size:18px;
line-height:1.8;
}

.step-photo{
display:block;
width:100%;
max-width:680px;
margin:0 auto;
border-radius:18px;
box-shadow:0 18px 40px rgba(0,0,0,.12);
}

.video-container{
position:relative;
width:100%;
padding-bottom:56.25%;
overflow:hidden;
background:#111;
border-radius:18px;
box-shadow:0 20px 48px rgba(0,0,0,.12);
}

.video-container iframe{
position:absolute;
inset:0;
width:100%;
height:100%;
border:0;
}

.final-message{
padding-top:70px;
text-align:center;
}

.final-message p{
font-size:20px;
line-height:1.9;
color:#555;
}

.final-name{
display:block;
margin-top:18px;
font-size:34px;
color:#222;
font-weight:500;
}

@keyframes appear{
from{
opacity:0;
transform:translateY(18px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:600px){

.page{
padding:42px 16px 75px;
}

.step{
margin-bottom:70px;
}

.step-photo{
border-radius:14px;
}

}

</style>
