<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tanti auguri</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      align-items: center;
      justify-content: center;

      background: #f7f5f2;
      color: #222;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      width: 100%;
      max-width: 760px;
      text-align: center;
      animation: appear 1.2s ease;
    }

    .message {
      margin-bottom: 38px;
    }

    h1 {
      margin-bottom: 12px;

      font-size: clamp(32px, 8vw, 58px);
      font-weight: 500;
      letter-spacing: -1.5px;
    }

    p {
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 300;
      color: #666;
      letter-spacing: 0.3px;
    }

    .video-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      overflow: hidden;

      background: #111;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
    }

    .video-container iframe {
      position: absolute;
      inset: 0;

      width: 100%;
      height: 100%;
      border: 0;
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 30px 16px;
      }

      .message {
        margin-bottom: 28px;
      }

      .video-container {
        border-radius: 14px;
      }
    }
  </style>
</head>

<body>

  <main class="page">

    <div class="message">
      <h1>Tanti auguri.</h1>
      <p>Ho voluto darteli così.</p>
    </div>

    <div class="video-container">
      <iframe
        src="https://www.youtube.com/embed/VIDEO_ID"
        title="Video di auguri"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
    </div>

  </main>

</body>
</html>
